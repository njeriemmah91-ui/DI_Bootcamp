<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recipe Book - Mini Project</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div class="container">
      <header class="header">
        <h1>🍳 Recipe Book</h1>
        <p>Manage your favorite recipes</p>
      </header>

      <div class="main-content">
        <section class="add-recipe-section">
          <h2>Add New Recipe</h2>
          <form id="recipeForm" class="recipe-form">
            <div class="form-group">
              <label for="title">Recipe Title</label>
              <input 
                type="text" 
                id="title" 
                placeholder="Enter recipe name" 
                required
              />
            </div>

            <div class="form-group">
              <label for="ingredients">Ingredients</label>
              <textarea 
                id="ingredients" 
                placeholder="Enter ingredients (one per line)" 
                required
              ></textarea>
            </div>

            <div class="form-group">
              <label for="instructions">Instructions</label>
              <textarea 
                id="instructions" 
                placeholder="Enter cooking instructions" 
                required
              ></textarea>
            </div>

            <button type="submit" class="btn btn-primary">Add Recipe</button>
          </form>
        </section>

        <section class="recipes-section">
          <div class="recipes-header">
            <h2>Your Recipes</h2>
            <button id="clearAllBtn" class="btn btn-danger">Clear All Recipes</button>
          </div>
          <div id="recipesContainer" class="recipes-container">
            <!-- Recipe cards will be rendered here -->
          </div>
        </section>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
