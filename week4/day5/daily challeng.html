<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Giphy Random GIF App</title>
</head>
<body>

  <form id="gifForm">
    <input type="text" id="searchInput" placeholder="Search GIF (e.g. sun)">
    <button type="submit">Get GIF</button>
  </form>

  <button id="deleteAll">DELETE ALL</button>

  <div id="gifContainer"></div>

  <script>
    const form = document.getElementById("gifForm");
    const input = document.getElementById("searchInput");
    const container = document.getElementById("gifContainer");
    const deleteAllBtn = document.getElementById("deleteAll");

    const API_KEY = "hpvZycW22qCjn5cRM1xtWB8NKq4dQ2My";

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const query = input.value.trim();
      if (!query) return;

      await fetchGif(query);

      input.value = "";
    });

    async function fetchGif(query) {
      try {
        const response = await fetch(
          `https://api.giphy.com/v1/gifs/random?api_key=${API_KEY}&tag=${query}`
        );

        if (!response.ok) {
          throw new Error("Error: " + response.status);
        }

        const data = await response.json();

        const gifUrl = data.data.images.original.url;

        createGif(gifUrl);

      } catch (error) {
        console.log("Error fetching GIF:", error);
      }
    }

    function createGif(gifUrl) {
      const wrapper = document.createElement("div");

      const img = document.createElement("img");
      img.src = gifUrl;

      const deleteBtn = document.createElement("button");
      deleteBtn.textContent = "DELETE";

      deleteBtn.addEventListener("click", () => {
        wrapper.remove();
      });

      wrapper.appendChild(img);
      wrapper.appendChild(deleteBtn);

      container.appendChild(wrapper);
    }

    deleteAllBtn.addEventListener("click", () => {
      container.innerHTML = "";
    });
  </script>

</body>
</html>
