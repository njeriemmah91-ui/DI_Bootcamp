<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Currency Converter</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;

      /* US DOLLAR BACKGROUND */
      background-image: url("https://images.unsplash.com/photo-1580519542036-c47de6196ba5");
      background-size: cover;
      background-position: center;
      height: 100vh;

      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      background: white;
      padding: 20px;
      width: 320px;
      text-align: center;
    }

    img {
      width: 100%;
      margin-bottom: 10px;
    }

    input, select, button {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
    }

    button {
      border: none;
      cursor: pointer;
    }

    #convertBtn {
      background: #2a5298;
      color: white;
    }

    #swapBtn {
      background: #555;
      color: white;
    }

    #result {
      margin-top: 10px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="container">

  <!-- REQUIRED IMAGE -->
  <img src="https://images.unsplash.com/photo-1580519542036-c47de6196ba5" alt="US Dollars">

  <h2>Currency Converter</h2>

  <input type="number" id="amount" placeholder="Enter amount">

  <select id="fromCurrency"></select>

  <button id="swapBtn">Switch</button>

  <select id="toCurrency"></select>

  <button id="convertBtn">Convert</button>

  <div id="result"></div>

</div>

<script>
const API_KEY = "YOUR_API_KEY_HERE";
const BASE_URL = "https://v6.exchangerate-api.com/v6";

const fromCurrency = document.getElementById("fromCurrency");
const toCurrency = document.getElementById("toCurrency");
const amount = document.getElementById("amount");
const result = document.getElementById("result");

const convertBtn = document.getElementById("convertBtn");
const swapBtn = document.getElementById("swapBtn");

// GET ALL CURRENCIES
async function loadCurrencies() {
  const res = await fetch(`${BASE_URL}/${API_KEY}/codes`);
  const data = await res.json();

  data.supported_codes.forEach(code => {
    const option1 = document.createElement("option");
    option1.value = code[0];
    option1.textContent = code[0];

    const option2 = option1.cloneNode(true);

    fromCurrency.appendChild(option1);
    toCurrency.appendChild(option2);
  });

  fromCurrency.value = "USD";
  toCurrency.value = "EUR";
}

// CONVERT
async function convertCurrency() {
  const from = fromCurrency.value;
  const to = toCurrency.value;
  const amt = amount.value;

  if (!amt) {
    result.textContent = "Please enter amount";
    return;
  }

  const res = await fetch(`${BASE_URL}/${API_KEY}/pair/${from}/${to}/${amt}`);
  const data = await res.json();

  result.textContent = `${amt} ${from} = ${data.conversion_result} ${to}`;
}

// SWAP
function swapCurrencies() {
  const temp = fromCurrency.value;
  fromCurrency.value = toCurrency.value;
  toCurrency.value = temp;
}

// EVENTS
convertBtn.addEventListener("click", convertCurrency);
swapBtn.addEventListener("click", swapCurrencies);

// INIT
loadCurrencies();
</script>

</body>
</html>
