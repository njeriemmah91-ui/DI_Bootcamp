<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Star Wars AJAX App</title>

  <!-- FontAwesome for loading icon -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #000;
      color: #fff;
      text-align: center;
      padding: 30px;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 20px;
    }

    #card {
      margin-top: 30px;
      padding: 20px;
      border: 1px solid #555;
      display: inline-block;
      min-width: 300px;
      border-radius: 10px;
      background: #111;
    }

    #loading {
      display: none;
      margin-top: 20px;
      font-size: 18px;
    }

    #error {
      display: none;
      margin-top: 20px;
      color: red;
    }
  </style>
</head>

<body>

  <h1>🌟 Star Wars Character App</h1>

  <button id="btn">Get Random Character</button>

  <!-- Loading -->
  <div id="loading">
    <i class="fa-solid fa-spinner fa-spin"></i> Loading...
  </div>

  <!-- Error -->
  <div id="error">⚠️ Failed to load data. Try again.</div>

  <!-- Character Card -->
  <div id="card">
    <h2 id="name">Name</h2>
    <p id="height"></p>
    <p id="gender"></p>
    <p id="birth"></p>
    <p id="homeworld"></p>
  </div>

<script>
  // =========================
  // DOM ELEMENTS
  // =========================
  const btn = document.getElementById("btn");
  const loading = document.getElementById("loading");
  const errorBox = document.getElementById("error");

  const nameEl = document.getElementById("name");
  const heightEl = document.getElementById("height");
  const genderEl = document.getElementById("gender");
  const birthEl = document.getElementById("birth");
  const homeworldEl = document.getElementById("homeworld");

  // =========================
  // FETCH CHARACTER (AJAX)
  // =========================
  async function getCharacter() {
    try {
      errorBox.style.display = "none";
      loading.style.display = "block";

      // random ID (1–83)
      const id = Math.floor(Math.random() * 83) + 1;

      const response = await fetch(`https://www.swapi.tech/api/people/${id}`);
      const data = await response.json();

      const character = data.result.properties;

      // get homeworld name
      const homeResponse = await fetch(character.homeworld);
      const homeData = await homeResponse.json();

      const homeworld = homeData.result.properties.name;

      displayCharacter(character, homeworld);

    } catch (error) {
      console.log(error);
      errorBox.style.display = "block";
    } finally {
      loading.style.display = "none";
    }
  }

  // =========================
  // DISPLAY DATA
  // =========================
  function displayCharacter(char, homeworld) {
    nameEl.textContent = char.name;
    heightEl.textContent = "Height: " + char.height;
    genderEl.textContent = "Gender: " + char.gender;
    birthEl.textContent = "Birth Year: " + char.birth_year;
    homeworldEl.textContent = "Homeworld: " + homeworld;
  }

  // =========================
  // EVENT LISTENER
  // =========================
  btn.addEventListener("click", getCharacter);
</script>

</body>
</html>
