<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mad Libs Game</title>
<style>
    body {
        font-family: Arial, sans-serif;
        padding: 20px;
        background-color: #f4f4f4;
    }

    h1 {
        color: #333;
        text-align: center;
    }

    form {
        max-width: 400px;
        margin: 0 auto 20px auto;
        padding: 20px;
        background: #fff;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    label {
        display: block;
        margin: 10px 0 5px 0;
    }

    input {
        width: 100%;
        padding: 8px;
        margin-bottom: 10px;
        border-radius: 5px;
        border: 1px solid #ccc;
    }

    button {
        padding: 10px 20px;
        border: none;
        background: #4CAF50;
        color: #fff;
        border-radius: 5px;
        cursor: pointer;
        margin-top: 5px;
    }

    button:hover {
        background: #45a049;
    }

    #story {
        display: block;
        margin: 20px auto;
        max-width: 600px;
        background: #fff;
        padding: 15px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
        font-weight: bold;
    }
</style>
</head>
<body>

<h1>Mad Libs Game</h1>

<form id="libform">
    <label for="noun">Noun:</label>
    <input type="text" id="noun" placeholder="Enter a noun" required>

    <label for="adjective">Adjective:</label>
    <input type="text" id="adjective" placeholder="Enter an adjective" required>

    <label for="person">Someone's Name:</label>
    <input type="text" id="person" placeholder="Enter a name" required>

    <label for="verb">Verb:</label>
    <input type="text" id="verb" placeholder="Enter a verb" required>

    <label for="place">A place:</label>
    <input type="text" id="place" placeholder="Enter a place" required>

    <button id="lib-button">Lib it!</button>
    <button type="button" id="shuffle-button">Shuffle Story</button>
</form>

<p>Generated story:</p>
<span id="story"></span>

<script>
    const libForm = document.getElementById('libform');
    const storyEl = document.getElementById('story');
    const shuffleBtn = document.getElementById('shuffle-button');

    let userInputs = {}; // Store user input for shuffling
    let stories = [];     // Array of story templates

    // Define multiple story templates
    stories = [
        (noun, adjective, person, verb, place) =>
            `${person} went to the ${place} with a ${adjective} ${noun} and decided to ${verb} all day!`,
        (noun, adjective, person, verb, place) =>
            `Once upon a time, ${person} saw a ${adjective} ${noun} in ${place} and couldn't stop ${verb}.`,
        (noun, adjective, person, verb, place) =>
            `In the ${place}, ${person} found a ${adjective} ${noun} and started to ${verb} happily.`,
        (noun, adjective, person, verb, place) =>
            `${person} was walking in ${place} when a ${adjective} ${noun} appeared and told them to ${verb}.`,
        (noun, adjective, person, verb, place) =>
            `Everyone in ${place} watched as ${person} ${verb} a ${adjective} ${noun}!`
    ];

    function generateStory() {
        const noun = document.getElementById('noun').value.trim();
        const adjective = document.getElementById('adjective').value.trim();
        const person = document.getElementById('person').value.trim();
        const verb = document.getElementById('verb').value.trim();
        const place = document.getElementById('place').value.trim();

        // Ensure inputs are not empty
        if (!noun || !adjective || !person || !verb || !place) {
            alert("Please fill in all the fields!");
            return;
        }

        // Save inputs for shuffle
        userInputs = { noun, adjective, person, verb, place };

        // Pick a random story template
        const randomIndex = Math.floor(Math.random() * stories.length);
        storyEl.textContent = stories[randomIndex](noun, adjective, person, verb, place);
    }

    function shuffleStory() {
        if (!userInputs.noun) {
            alert("Please generate a story first!");
            return;
        }
        const { noun, adjective, person, verb, place } = userInputs;
        const randomIndex = Math.floor(Math.random() * stories.length);
        storyEl.textContent = stories[randomIndex](noun, adjective, person, verb, place);
    }

    libForm.addEventListener('submit', (e) => {
        e.preventDefault();
        generateStory();
    });

    shuffleBtn.addEventListener('click', shuffleStory);
</script>

</body>
</html>
