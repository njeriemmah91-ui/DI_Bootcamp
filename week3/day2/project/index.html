<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DI Bootcamp Exercises 5 & 6</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      font-size: 18px;
    }
  </style>
</head>
<body>

  <!-- Exercise 5: Users -->
  <div id="container">Users:</div>
  <ul class="list">
    <li>John</li>
    <li>Pete</li>
  </ul>
  <ul class="list">
    <li>David</li>
    <li>Sarah</li>
    <li>Dan</li>
  </ul>

  <!-- Exercise 6: Navbar -->
  <div id="navBar">
    <ul>
      <li><a href="#">Profile</a></li>
      <li><a href="#">Home</a></li>
      <li><a href="#">My Friends</a></li>
      <li><a href="#">Messenger</a></li>
      <li><a href="#">My Pics</a></li>
    </ul>
  </div>

  <!-- JS Script -->
  <script>
    // =======================
    // Exercise 5: Users DOM Manipulation
    // =======================

    // Get container div and log it
    const container = document.getElementById("container");
    console.log(container);e

    // Get all <ul> elements with class 'list'
    const lists = document.querySelectorAll("ul.list");

    // Change "Pete" to "Richard"
    lists[0].children[1].textContent = "Richard";

    // Delete the second <li> of the second <ul> (Sarah)
    lists[1].children[1]?.remove();

    // Change first <li> of each <ul> to your name
    for (let ul of lists) {
      ul.children[0].textContent = "Emmah";
    }

    // Add class 'student_list' to both <ul>
    lists.forEach(ul => ul.classList.add("student_list"));

    // Add classes 'university' and 'attendance' to first <ul>
    lists[0].classList.add("university", "attendance");

    // Style the container
    container.style.backgroundColor = "lightblue";
    container.style.padding = "10px";

    // Hide last <li> of second <ul> (Dan)
    lists[1].children[1]?.style.display = "none";

    // Add border to <li> containing "Richard"
    lists[0].children[1].style.border = "1px solid black";

    // Bonus: alert if container background is light blue
    if (container.style.backgroundColor === "lightblue") {
      const users = Array.from(lists[0].children).map(li => li.textContent);
      alert(`Hello ${users.join(" and ")}`);
    }

    // =======================
    // Exercise 6: Navbar DOM Manipulation
    // =======================

    // Change id of div from 'navBar' to 'socialNetworkNavigation'
    const nav = document.getElementById("navBar");
    nav.setAttribute("id", "socialNetworkNavigation");

    // Add a new <li> with text "Logout"
    const newLi = document.createElement("li");
    newLi.textContent = "Logout";
    nav.querySelector("ul").appendChild(newLi);

    // Display first and last <li> text
    const ulNav = nav.querySelector("ul");
    console.log("First item:", ulNav.firstElementChild.textContent);
    console.log("Last item:", ulNav.lastElementChild.textContent);
  </script>
</body>
</html>
